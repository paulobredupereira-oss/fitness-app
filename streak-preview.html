<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Streak Animation Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, system-ui, 'Segoe UI', sans-serif;
  }

  .overlay {
    position: fixed; inset: 0;
    background: #000;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    animation: bgFadeIn 0.25s ease forwards;
  }
  .glow {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(251,146,60,0.18) 0%, transparent 70%);
    pointer-events: none;
  }
  .content {
    text-align: center;
    position: relative;
    animation: streakPop 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }
  .fire {
    font-size: 100px;
    line-height: 1;
    display: block;
    filter: drop-shadow(0 0 32px rgba(251,146,60,0.9)) drop-shadow(0 0 64px rgba(234,88,12,0.5));
    animation: fireFlicker 0.8s ease-in-out infinite alternate;
  }
  .number {
    font-size: 96px;
    font-weight: 900;
    letter-spacing: -0.06em;
    line-height: 1;
    margin-top: 8px;
    color: #fff;
    text-shadow: 0 0 60px rgba(251,146,60,0.8), 0 0 20px rgba(251,146,60,0.5);
    font-variant-numeric: tabular-nums;
    min-width: 120px;
    display: inline-block;
  }
  .label {
    font-size: 22px;
    font-weight: 700;
    color: rgba(255,255,255,0.85);
    margin-top: 6px;
    letter-spacing: -0.02em;
  }
  .sub {
    font-size: 15px;
    color: #fb923c;
    margin-top: 10px;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .sub.show { opacity: 1; }
  .hint {
    font-size: 12px;
    color: rgba(255,255,255,0.25);
    margin-top: 36px;
  }
  .replay {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: rgba(251,146,60,0.15); border: 1px solid rgba(251,146,60,0.4);
    color: #fb923c; padding: 10px 24px; border-radius: 20px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    font-family: inherit; display: none;
    transition: background 0.2s;
    z-index: 10;
  }
  .replay:hover { background: rgba(251,146,60,0.25); }

  @keyframes bgFadeIn { from { opacity: 0 } to { opacity: 1 } }
  @keyframes streakPop {
    0%   { transform: scale(0.15) translateY(40px); opacity: 0 }
    65%  { transform: scale(1.08) translateY(-6px); opacity: 1 }
    82%  { transform: scale(0.97) translateY(2px) }
    100% { transform: scale(1) translateY(0) }
  }
  @keyframes fireFlicker {
    from { transform: scale(1) rotate(-4deg); filter: drop-shadow(0 0 28px rgba(251,146,60,0.9)) }
    to   { transform: scale(1.10) rotate(4deg); filter: drop-shadow(0 0 48px rgba(234,88,12,1)) }
  }
  @keyframes fadeOut { to { opacity: 0; pointer-events: none } }
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="dismiss()">
  <div class="glow"></div>
  <div class="content">
    <span class="fire">🔥</span>
    <div class="number" id="num">0</div>
    <div class="label" id="label">dia consecutivo</div>
    <div class="sub" id="sub">🏁 Começo de uma sequência!</div>
    <div class="hint">toque para fechar</div>
  </div>
</div>

<button class="replay" id="replayBtn" onclick="startAnimation()">▶ Repetir animação</button>

<script>
  const TARGET = 3;

  function startAnimation() {
    const overlay  = document.getElementById('overlay');
    const numEl    = document.getElementById('num');
    const labelEl  = document.getElementById('label');
    const subEl    = document.getElementById('sub');
    const replayBtn = document.getElementById('replayBtn');

    // Reset
    overlay.style.display = 'flex';
    overlay.style.animation = 'bgFadeIn 0.25s ease forwards';
    overlay.style.opacity = '1';
    overlay.style.pointerEvents = 'auto';
    numEl.textContent = '0';
    subEl.classList.remove('show');
    replayBtn.style.display = 'none';

    // Redo pop animation on content
    const content = overlay.querySelector('.content');
    content.style.animation = 'none';
    void content.offsetWidth; // reflow
    content.style.animation = 'streakPop 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards';

    // Count up 0 → TARGET
    const duration = Math.min(900, TARGET * 120);
    const interval = duration / TARGET;
    let current = 0;
    const timer = setInterval(() => {
      current++;
      numEl.textContent = current;
      labelEl.textContent = current === 1 ? 'dia consecutivo' : 'dias consecutivos';
      if (current === 1) subEl.textContent = '🏁 Começo de uma sequência!';
      else if (current >= 7) subEl.textContent = '🏆 Semana completa!';
      else subEl.textContent = '🔥 Continue assim!';
      if (current >= TARGET) {
        clearInterval(timer);
        setTimeout(() => subEl.classList.add('show'), 100);
      }
    }, interval);

    // Auto fade out after 3.2s
    setTimeout(() => {
      overlay.style.transition = 'opacity 0.6s ease';
      overlay.style.opacity = '0';
      overlay.style.pointerEvents = 'none';
      setTimeout(() => {
        overlay.style.display = 'none';
        replayBtn.style.display = 'block';
      }, 650);
    }, 3200);
  }

  function dismiss() {
    const overlay = document.getElementById('overlay');
    overlay.style.transition = 'opacity 0.3s ease';
    overlay.style.opacity = '0';
    overlay.style.pointerEvents = 'none';
    setTimeout(() => {
      overlay.style.display = 'none';
      document.getElementById('replayBtn').style.display = 'block';
    }, 350);
  }

  // Auto start
  startAnimation();
</script>
</body>
</html>
